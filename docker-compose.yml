version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: proyecto-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: julian_db
      MYSQL_USER: julian
      MYSQL_PASSWORD: julian12345
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  app:
    build: .
    container_name: proyecto-app
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

volumes:
  db_data: